<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Daily Flow</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #b8c6db, #f5f7fa);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #333;
    }

    .welcome-card {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
    }

    .welcome-card img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 24px;
      color: #005f73;
    }

    p {
      font-size: 16px;
      color: #333;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #0077b6;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #023e8a;
    }
  </style>
</head>
<body>
  <div class="welcome-card" id="welcomeBox">
    <img id="userImage" src="" alt="User">
    <h1 id="welcomeText">Welcome!</h1>
    <p>Glad to have you here on Daily Flow 🌸</p>
    <button onclick="backToLogin()">Log out</button>
  </div>

  <script>
    // نحاكي تحديد الجنس من صفحة التسجيل
    const gender = localStorage.getItem("userGender") || "female";

    const userImage = document.getElementById("userImage");
    const welcomeText = document.getElementById("welcomeText");

    if (gender === "male") {
      userImage.src = "https://cdn-icons-png.flaticon.com/512/921/921071.png";
      welcomeText.textContent = "Welcome back, handsome! 😎";
    } else {
      userImage.src = "https://cdn-icons-png.flaticon.com/512/921/921124.png";
      welcomeText.textContent = "Welcome back, lovely! 💖";
    }

    function backToLogin() {
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
