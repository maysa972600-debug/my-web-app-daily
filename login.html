<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Flow-Smart-Planner | Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd);
      position: relative;

  
    }

    /* 🎨 أشكال الخلفية */
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.35;
      filter: blur(30px);
      z-index: 0;
      animation: float 8s ease-in-out infinite alternate;
    }

    .shape1 {
      width: 220px;
      height: 220px;
      background: #fc5c7d;
      top: 15%;
      left: 10%;
      animation-delay: 0s;
    }

    .shape2 {
      width: 300px;
      height: 300px;
      background: #6a82fb;
      bottom: 15%;
      right: 8%;
      animation-delay: 2s;
    }

    .shape3 {
      width: 180px;
      height: 180px;
      background: #fbc2eb;
      top: 70%;
      left: 5%;
      animation-delay: 4s;
    }

    @keyframes float {
      from { transform: translateY(0px) scale(1); }
      to { transform: translateY(-20px) scale(1.05); }
    }

    .navbar {
      background-color: rgba(255, 255, 255, 0.7);
      padding: 15px 40px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(8px);
      gap: 10px;
    }

    /* 🌸 الشعار */
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6a82fb, #fc5c7d);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
      box-shadow: 0 0 10px rgba(255,255,255,0.7);
      animation: spinLogo 3s ease-in-out infinite alternate;
    }

    @keyframes spinLogo {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(15deg) scale(1.05); }
    }

    .navbar h2 {
      margin: 0;
      color: #333;
      font-size: 1.5em;
      font-weight: 600;
    }

    .form-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 80vh;
      position: relative;
      z-index: 1;
    }

    form {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      width: 350px;
      backdrop-filter: blur(10px);
      animation: fadeIn 1.5s ease;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    form h3 {
      color: #333;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1em;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #6a82fb;
      box-shadow: 0 0 6px #b9c9ff;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #6a82fb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #fc5c7d;
    }

    .switch {
      text-align: center;
      margin-top: 15px;
      color: #444;
      cursor: pointer;
      font-size: 0.95em;
    }

    .switch:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- 🎨 الأشكال في الخلفية -->
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>
  <div class="shape shape3"></div>

  <div class="navbar">
    <div class="logo">D</div>
    <h2>Daily Flow</h2>
  </div>
  <div class="gender-select">
  <label>
    <input type="radio" name="gender" value="female" checked> Girl
  </label>
  <label>
    <input type="radio" name="gender" value="male"> Boy
  </label>
</div>


  <div class="form-container">
    <form id="loginForm">
      <h3>Login to Your Account</h3>
      <div class="tagline">Organize your flow, every day 🌈</div>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <div class="switch" onclick="toggleForm()">Don’t have an account? Sign Up</div>
    </form>
  </div>

  <script>
  function toggleForm() {
    const form = document.getElementById("loginForm");
    form.innerHTML = `
      <h3>Create Your Account</h3>
      <div class="tagline">Let’s start your journey with calm and focus 💫</div>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <div class="gender-select">
        <label>
          <input type="radio" name="gender" value="female" checked> Girl
        </label>
        <label>
          <input type="radio" name="gender" value="male"> Boy
        </label>
      </div>
      <button type="submit">Sign Up</button>
      <div class="switch" onclick="toggleFormBack()">Already have an account? Login</div>
    `;
  }

  function toggleFormBack() {
    const form = document.getElementById("loginForm");
    form.innerHTML = `
      <h3>Login to Your Account</h3>
      <div class="tagline">Organize your flow, every day 🌈</div>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <div class="switch" onclick="toggleForm()">Don’t have an account? Sign Up</div>
    `;
  }

  // التحكم بعد الضغط على الزر
  document.addEventListener("submit", function(e) {
    e.preventDefault();
    const gender = document.querySelector('input[name="gender"]:checked')?.value || "female";
    localStorage.setItem("userGender", gender);
    window.location.href = "welcome.html";
  });
</script>
